<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSL-KDD | Real-Time IDS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --glass-bg: rgba(20, 25, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-blue: #00e5ff;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(90deg, var(--accent-blue), #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px;}

        .api-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            background: var(--glass-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            background-color: var(--accent-red); /* Red by default until connected */
            box-shadow: 0 0 10px var(--accent-red);
        }
        .pulse.active { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); animation: pulsing 2s infinite; }

        @keyframes pulsing {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.2rem; font-weight: 600;
            margin-bottom: 1.5rem; color: #fff;
            display: flex; justify-content: space-between;
        }

        /* Metrics */
        .metrics-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 1rem; text-align: center;
        }
        .metric-val { font-size: 2rem; font-weight: 800; margin: 0.5rem 0; color: var(--accent-blue); }
        .metric-lbl { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;}

        .charts img {
            width: 100%; border-radius: 8px; margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }
        .charts img:hover { transform: scale(1.02); }

        /* Live Feed */
        .controls { margin-bottom: 1rem; display: flex; gap: 1rem; }
        button {
            background: linear-gradient(45deg, #1e293b, #0f172a);
            color: #fff; border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            transition: all 0.2s;
        }
        button:hover { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        button.running { border-color: var(--accent-green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .feed-container {
            display: flex; flex-direction: column; gap: 0.8rem;
            height: 600px; overflow-y: auto;
            padding-right: 10px;
        }
        
        .feed-container::-webkit-scrollbar { width: 6px; }
        .feed-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

        .connection-row {
            display: grid; grid-template-columns: 1fr 3fr 1.5fr 1fr;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--glass-border);
            padding: 1rem; border-radius: 8px;
            animation: slideIn 0.3s ease forwards;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .conn-normal { border-left-color: var(--accent-green); }
        .conn-attack { border-left-color: var(--accent-red); background: rgba(255, 51, 102, 0.05); }

        .badge {
            padding: 4px 8px; border-radius: 4px; font-weight: 600; text-align: center;
        }
        .bg-normal { background: rgba(0, 255, 136, 0.1); color: var(--accent-green); }
        .bg-attack { background: rgba(255, 51, 102, 0.1); color: var(--accent-red); }

        .conn-details { color: var(--text-dim); }
        .conn-details span { color: #fff; }
        
        .latency { text-align: right; color: var(--text-dim); }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>Intelligent IDS Dashboard</h1>
            <div class="subtitle">Propulsé par XGBoost, SMOTE & FastAPI</div>
        </div>
        <div class="api-status">
            <div class="pulse" id="status-pulse"></div>
            <span id="status-text">API Déconnectée</span>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- Left Panel: Metrics -->
        <div class="glass-panel">
            <div class="panel-title">Performances du Modèle</div>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-lbl">Accuracy Globale</div>
                    <div class="metric-val">78.95%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-lbl">F1-Score Macro</div>
                    <div class="metric-val">0.63</div>
                </div>
                <div class="metric-card">
                    <div class="metric-lbl">Détection DoS</div>
                    <div class="metric-val">96.6%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-lbl">Latence Inférence</div>
                    <div class="metric-val">~7 ms</div>
                </div>
            </div>

        </div>

        <!-- Right Panel: Live Feed -->
        <div class="glass-panel">
            <div class="panel-title">
                Flux Réseau Temps Réel
                <span id="speed-indicator" style="color: var(--accent-blue); font-family: monospace; font-size: 0.9rem;"></span>
            </div>
            
            <div class="controls">
                <button id="toggle-feed">▶ Démarrer la Simulation</button>
            </div>

            <div class="feed-container" id="feed-container">
                <!-- Rows injected by JS -->
            </div>
        </div>

        <!-- Bottom Panel: Visualisations (Full Width) -->
        <div class="glass-panel" style="grid-column: 1 / -1;">
            <div class="panel-title">Visualisations (Comparaison Random Forest vs XGBoost)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="charts">
                    <img src="confusion_matrices_optimized.png" alt="Confusion Matrix">
                </div>
                <div class="charts">
                    <img src="feature_importance_optimized.png" alt="Feature Importance">
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let isRunning = false;
        let intervalId = null;

        const pulse = document.getElementById('status-pulse');
        const statusText = document.getElementById('status-text');
        const feedContainer = document.getElementById('feed-container');
        const toggleBtn = document.getElementById('toggle-feed');

        // Check API Status on load
        async function checkAPI() {
            try {
                const res = await fetch(API_URL + "/");
                if (res.ok) {
                    pulse.classList.add('active');
                    statusText.textContent = "API Connectée";
                    return true;
                }
            } catch (e) {
                pulse.classList.remove('active');
                statusText.textContent = "API Déconnectée (Lancez uvicorn)";
            }
            return false;
        }
        checkAPI();

        async function fetchPrediction() {
            try {
                const res = await fetch(API_URL + "/predict/random");
                const data = await res.json();
                renderRow(data);
            } catch (e) {
                console.error("API Fetch Error", e);
                stopFeed();
            }
        }

        function renderRow(data) {
            const isAttack = data.prediction !== 'Normal';
            const rowClass = isAttack ? 'conn-attack' : 'conn-normal';
            const badgeClass = isAttack ? 'bg-attack' : 'bg-normal';
            
            // Format details
            const proto = data.network_data.protocol_type.toUpperCase();
            const srv = data.network_data.service;
            const bytes = `${data.network_data.src_bytes}B / ${data.network_data.dst_bytes}B`;

            const row = document.createElement('div');
            row.className = `connection-row ${rowClass}`;
            
            row.innerHTML = `
                <div>
                    <div class="badge ${badgeClass}">${data.prediction}</div>
                </div>
                <div class="conn-details">
                    [<span>${proto}</span>] srv:<span>${srv}</span> | flag:<span>${data.network_data.flag}</span> <br>
                    <small>Traffic: ${bytes}</small>
                </div>
                <div>
                    <small style="color: var(--text-dim)">Confiance</small><br>
                    <strong>${data.confidence}%</strong>
                </div>
                <div class="latency">
                    ${data.latency_ms} ms
                </div>
            `;

            // Insert at top
            feedContainer.prepend(row);

            // Keep only last 50 items
            if (feedContainer.children.length > 50) {
                feedContainer.removeChild(feedContainer.lastChild);
            }
        }

        function toggleFeed() {
            if (isRunning) {
                stopFeed();
            } else {
                startFeed();
            }
        }

        async function startFeed() {
            const ok = await checkAPI();
            if (!ok) {
                alert("Impossible de se connecter à l'API. Avez-vous lancé le serveur 'uvicorn api:app' ?");
                return;
            }
            isRunning = true;
            toggleBtn.textContent = "⏸ Mettre en pause";
            toggleBtn.classList.add('running');
            
            // Fetch every 1s
            intervalId = setInterval(fetchPrediction, 1000);
            fetchPrediction(); // call first immediately
        }

        function stopFeed() {
            isRunning = false;
            toggleBtn.textContent = "▶ Démarrer la Simulation";
            toggleBtn.classList.remove('running');
            clearInterval(intervalId);
        }

        toggleBtn.addEventListener('click', toggleFeed);
    </script>
</body>
</html>
