services:

  # FastAPI backend — loads the trained model and serves predictions
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    container_name: ids_api_backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx — serves the dashboard HTML and report charts as static files
  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ../reports/confusion_matrices.png:/usr/share/nginx/html/confusion_matrices.png:ro
      - ../reports/feature_importance.png:/usr/share/nginx/html/feature_importance.png:ro
      - ../reports/model_comparison.png:/usr/share/nginx/html/model_comparison.png:ro
      - ../reports/roc_curves.png:/usr/share/nginx/html/roc_curves.png:ro
    depends_on:
      - api
    restart: unless-stopped
    container_name: ids_dashboard_web
