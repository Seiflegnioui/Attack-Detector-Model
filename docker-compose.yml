services:
  # L'API Python FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    container_name: ids_api_backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Le serveur Web Nginx pour le Dashboard HTML
  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      # Montage des fichiers statiques dans le conteneur
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./confusion_matrices_optimized.png:/usr/share/nginx/html/confusion_matrices_optimized.png:ro
      - ./feature_importance_optimized.png:/usr/share/nginx/html/feature_importance_optimized.png:ro
      - ./model_comparison_optimized.png:/usr/share/nginx/html/model_comparison_optimized.png:ro
      - ./roc_curves_optimized.png:/usr/share/nginx/html/roc_curves_optimized.png:ro
    depends_on:
      - api
    restart: unless-stopped
    container_name: ids_dashboard_web
